<div class="lang-{{Language}}">
<script src="_highlight.min.js"></script>

<div class="slidecontainer" style="text-align: center; margin-top: -20px">
	<input type="range" min="0" max="1000" value="0" class="slider" id="myRange" style="height: 5px; opacity: 0.2; accent-color: white;">
</div>

<br>
{{#Prompt}}
<section class="prompt-panel">
	<div class="panel-label">Prompt</div>
	<div class="prompt-content">{{Prompt}}</div>
</section>
{{/Prompt}}

<div id="cloze-original" hidden="">{{Text}}</div>
<div id="cloze-anki-rendered" hidden="">{{cloze:Text}}</div>
<div id="cloze-overlapping-config" hidden=""></div>
<div id="cloze-subjects" hidden=""></div>
<div id="the_answer" hidden="">{{Answer}}</div>
<div id="replace" hidden=""></div>
<div id="cloze-js-rendered" style="display:block"></div>
<div id="showAllClozesButton" style="display:none"></div>

<!-- TYPING BOX INJECTED HERE -->
<br>
<div id="typing-area" style="text-align: center; margin-top: 15px;">
   {{type:cloze:Text}}
</div>

<script>
(function() {
	function escapeRegExp(string) {
		return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
	}
	var alreadyRendered = false;
	async function render() {
		if (alreadyRendered) return;
		alreadyRendered = true;

		const intRe = /^[+-]?\d+$/;
		var subjects = document.getElementById("cloze-subjects").innerText.split(/[,\s|.]+/).map(s => intRe.test(s) ? Number(s) : s);
		var revealFromSubjects = subjects.includes("hints");
		subjects = subjects.filter(s => s !== "hints");

		var config = document.getElementById("cloze-overlapping-config").innerText.split(/[,\s|.]+/);
		var leadingClozes = config[0] === "0" ? 0 : (+config[0] || 99);
		var followingClozes = config[1] === "0" ? 0 : (+config[1] || 99);

		var isBool = (config[2] || "").toLowerCase() === "true" || (config[2] || "").toLowerCase() === "false";
		var offset = isBool ? 0 : -1;
		var revealAllCustomPlaceholders = (isBool ? config[2].toLowerCase() === "true" : false) || revealFromSubjects;

		var numberClozes = config[3 + offset] === "0" ? 0 : (+config[3 + offset] || 1);
		var shiftClozes = config[4 + offset] === "0" ? 0 : (+config[4 + offset] || 0);

		var answer = document.getElementById("the_answer");
		var replace = document.getElementById("replace");
		var divJsRendered = document.getElementById("cloze-js-rendered");
		var timeout = 1000;
		var regex = /\\\([\s\S]*?\\\)|\\\[[\s\S]*?\\\]/;
		while (document.querySelector(".mobile") && regex.test(document.getElementById("cloze-original").innerHTML) && timeout > 0) {
			timeout -= 1;
			await new Promise(r => setTimeout(r, 1));
		}
		var divOriginal = document.getElementById("cloze-original");

		function randomize(text, isBackSide, id) {
			pattern = new RegExp(`\\[\\[r${id}::([\\s\\S]*?)\\]\\]`, "g");
			var allGroups = Array.from(text.matchAll(pattern), m => m[1]);
			var re = new RegExp(`^${id}p(\\d+)$`);
			var match = subjects.map(item => String(item).match(re)).find(m => m);
			if (match && allGroups.length % +match[1] == 0) {
				length = +match[1]
				var num_seq = allGroups.length / length
				for (let i = length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					for (let k = 0; k < num_seq; k++) {
						[allGroups[i + k*length], allGroups[j + k*length]] = [allGroups[j + k*length], allGroups[i + k*length]];
					}
				}
			} else {
				var re = new RegExp(`^${id}g(\\d+)$`);
				var match = subjects.map(item => String(item).match(re)).find(m => m);
				if (match && allGroups.length % +match[1] == 0) {
					length = +match[1]
				} else {
					length = 1
				}
				var num_groups = allGroups.length / length
				for (let i = num_groups - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					for (let k = 0; k < length; k++) {
						[allGroups[i*length + k], allGroups[j*length + k]] = [allGroups[j*length + k], allGroups[i*length + k]];
					}
				}
			}
			if (isBackSide) {
				var allGroupsBack = JSON.parse(localStorage.getItem(`groups${id}`));
				if (allGroupsBack === null || allGroupsBack.length != allGroups.length) {
					localStorage.removeItem(`groups${id}`);
				} else {
					allGroups = allGroupsBack;
				}
			} else {
				localStorage.setItem(`groups${id}`, JSON.stringify(allGroups));
			}
			return text.replace(pattern, () => allGroups.shift());
		};
		function randomize_id(text, isBackSide) {
			var outerPattern = /\[\[r\d*::[\s\S]*?\]\]/;
			while (outerPattern.test(text)) {
				var innerPattern = /\[\[r(\d*)::(?:(?!\[\[r)[\s\S])*?\]\]/g;
				var allIds = Array.from(text.matchAll(innerPattern), m => m[1]);
				allIds = [...new Set(allIds)];
				allIds.forEach(id => {text = randomize(text, isBackSide, id)});
			}
			return text;
		}

		var isBackSide = document.getElementById("cloze-is-back") ? true : false;
		divOriginal.innerHTML = randomize_id(divOriginal.innerHTML, isBackSide);

		if (replace.innerHTML != "") {
			divOriginal.innerHTML += "{" + "{c0::Replace}" + "}";
		}

		var allClozes = (function(){
			var allMatches = divOriginal.innerHTML.match(/\{\{c\d+::[\s\S]*?\}\}/g);
			var res = {};
			for (var i = 0; i < allMatches.length; i++) {
				var match = allMatches[i].match(/\{\{c(\d+)::([\s\S]*?)(::([\s\S]*?))?\}\}/);
				res[+match[1]] = res[+match[1]] || {askAll: false, clozes: {}};
				if (match[2] === "ask-all" || match[2] === "")
					res[+match[1]].askAll = true;
				res[+match[1]].clozes[allMatches[i]] = {content: match[2], placeholder: match[4] ? match[4] : "...", answer: false};
				if (match[2] === "ask-ans")
					res[+match[1]].clozes[allMatches[i]].answer = true;
			}
			return res;
		})();

		var currentCloze = +((document.body.className.match(/(^|\s)card(\d+)(\s|$)/) || [])[2]
						|| ((document.getElementById("qa_box") && document.getElementById("qa_box").className && document.getElementById("qa_box").className.match(/(^|\s)card(\d+)(\s|$)/)) || [])[2]
						|| 0);

		var showButton = false;
		var question = divOriginal.innerHTML;

		for (var i in allClozes) {
			for (var orig in allClozes[i].clozes) {
				var replacement = "";
				var markBlue = false;
				var answerCard = false;
				var replaceField = 0;
				var needle = new RegExp(escapeRegExp(orig), "g");
				if (allClozes[i].askAll)
					replacement = "";
				else if (i == 0) {
					replacement = "";
					if (!isBackSide && (answer.innerHTML == "" || Object.values(allClozes[currentCloze].clozes).some(entry => entry.answer === true))) {
						if (subjects.includes(-1)) {
							replaceField = 2;
						} else {
							replaceField = 1;
						}
					}
				} else if (allClozes[i].clozes[orig].answer) {
					replacement = ""
					if ((i != currentCloze) || (i == currentCloze && isBackSide)) {
						answerCard = true;
					}
				} else if (subjects.includes(parseInt(i)) && (i != currentCloze)) {
					replacement = allClozes[i].clozes[orig].content;
				} else if (i == currentCloze || allClozes[currentCloze].askAll || (!subjects.includes(parseInt(i)) && !subjects.includes(currentCloze) && currentCloze + shiftClozes - (numberClozes - 1) <= i && i <= currentCloze + shiftClozes)) {
					if (allClozes[i].clozes[orig].placeholder == "cloze-hide") {
						replacement = isBackSide ? allClozes[i].clozes[orig].content : "";
					} else {
						markBlue = true;
						replacement = isBackSide ? allClozes[i].clozes[orig].content : "[" + allClozes[i].clozes[orig].placeholder + "]";
					}
				} else if (subjects.includes(currentCloze) || (currentCloze + shiftClozes - (numberClozes - 1) - leadingClozes <= i && i <= currentCloze + shiftClozes + followingClozes))
					replacement = allClozes[i].clozes[orig].content;
				else if (!allClozes[i].askAll) {
					replacement = (revealAllCustomPlaceholders ? "[..." + allClozes[i].clozes[orig].placeholder + "...]" : "...");
					var showButton = true;
				} else {
					replacement = "";
				}
				question = question.replace(needle, function () {
					return (markBlue ? "<span class=\"cloze\">" : "") + replacement + (markBlue ? "</span>" : "");
				});
				question = question.replace(/(<br>|\s|<div>|<\/div>)+$/g, '');
				if (replaceField == 2) {
					question = "<span id=\"tradeoffer\" class=\"answerCard cloze\">" + replace.innerHTML + "<br><br></span>" + question;
				}
				question += (replaceField == 1 ? "<br><br><span class=\"answerCard cloze\">" + replace.innerHTML + "</span>" : "")
					+ (answerCard ? "<hr id=\"answer\" style=\"border: solid 1px; background-color: white;\"><span class=\"answerCard cloze\">" + answer.innerHTML + "</span><br>" : "")
			}
		}

		divJsRendered.innerHTML = question;

		try {
			if (typeof hljs !== 'undefined') {
				divJsRendered.querySelectorAll('pre code').forEach(function(b) {
					hljs.highlightElement(b);
				});
			} else {
				setTimeout(function() {
					if (typeof hljs !== 'undefined') {
						divJsRendered.querySelectorAll('pre code').forEach(function(b) {
							hljs.highlightElement(b);
						});
					}
				}, 300);
			}
		} catch(e) {}

		var clozesSpan = document.getElementById("showAllClozesButton");
		if (showButton) {
			clozesSpan.style.display = "block";
		} else {
			clozesSpan.style.display = "none";
		}
	}
	function delayedRender() {
		if (window.requestAnimationFrame) {
			window.requestAnimationFrame(render);
		} else {
			window.setTimeout(render, 0);
		}
	};
	window.onload = delayedRender();
	if (document.readyState === "complete") {
		delayedRender();
	} else {
		document.addEventListener("DOMContentLoaded", delayedRender);
	}
})();
</script>

<script>
var slider = document.getElementById("myRange");
slider.oninput = function() {
	const newValue = 260 + (window.innerWidth - 300)*this.value/1000 + 'px';
	if (this.value == 0) {
		document.querySelector('.card').style.maxWidth = "none";
		document.querySelector('.card').style.textAlign = "center";
		document.querySelector('.card').style.margin = "20px";
	} else {
		document.querySelector('.card').style.maxWidth = newValue;
		document.querySelector('.card').style.textAlign = "left";
		document.querySelector('.card').style.margin = "20px auto";
	}
}
</script>

</div>
